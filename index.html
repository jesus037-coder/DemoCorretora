<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root{
      --bg:#0A0E13; --surface:#141B24; --surface-2:#1B2430; --border:#242E3B;
      --text:#EAEFF4; --text-muted:#8C99A8; --text-dim:#5B6675; --amber:#F0A93E;
      --red:#F5486E; --red-soft:rgba(245,72,110,.13);
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,'Segoe UI',Inter,sans-serif; padding:20px;
    }
    header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
    h1{font-size:16px;margin:0;}
    #contagem{font-size:12px;color:var(--text-dim);margin-top:2px;}
    button{
      background:var(--amber);color:#1A1300;border:none;border-radius:8px;
      padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;
    }
    button:disabled{opacity:.6;cursor:default;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;overflow-x:auto;}
    #estadoLoading, #estadoEmpty{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text-dim);padding:50px 10px;font-size:13px;}
    .spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--amber);animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #estadoError{color:#FF8FA4;background:var(--red-soft);border:1px solid rgba(245,72,110,.35);border-radius:10px;padding:14px;font-size:13px;}
    table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:640px;}
    th{
      text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);
      padding:9px 10px;background:var(--surface-2);white-space:nowrap;
    }
    td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.05);white-space:nowrap;}
    tr:hover td{background:var(--surface-2);}
    [hidden]{display:none !important;}
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Base de Lançamentos</h1>
      <div id="contagem"></div>
    </div>
    <button id="btnAtualizar" onclick="forcarAtualizacao()">Forçar atualização</button>
  </header>

  <div class="card">
    <div id="estadoLoading">
      <div class="spinner"></div>
      <div>Carregando lançamentos…</div>
    </div>

    <div id="estadoEmpty" hidden>Nenhum lançamento encontrado na base.</div>

    <div id="estadoError" hidden></div>

    <div id="estadoTable" hidden style="overflow-x:auto;">
      <table>
        <thead><tr id="theadRow"></tr></thead>
        <tbody id="tbodyRows"></tbody>
      </table>
    </div>
  </div>

<script>
  function carregarDados() {
    mostrarEstado('estadoLoading');
    google.script.run
      .withSuccessHandler(renderizarTabela)
      .withFailureHandler(mostrarErro)
      .obterDadosLancamentos();
  }

  function forcarAtualizacao() {
    var btn = document.getElementById('btnAtualizar');
    btn.disabled = true;
    mostrarEstado('estadoLoading');
    google.script.run
      .withSuccessHandler(function (dados) { btn.disabled = false; renderizarTabela(dados); })
      .withFailureHandler(function (erro) { btn.disabled = false; mostrarErro(erro); })
      .limparCacheLancamentos();
  }

  function escapeHtml(valor) {
    if (valor === null || valor === undefined) return '';
    return String(valor)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderizarTabela(dados) {
    if (!dados || dados.length === 0) {
      mostrarEstado('estadoEmpty');
      document.getElementById('contagem').textContent = '';
      return;
    }
    var colunas = Object.keys(dados[0]);

    document.getElementById('theadRow').innerHTML =
      colunas.map(function (c) { return '<th>' + escapeHtml(c) + '</th>'; }).join('');

    document.getElementById('tbodyRows').innerHTML = dados.map(function (linha) {
      return '<tr>' + colunas.map(function (c) {
        return '<td>' + escapeHtml(linha[c]) + '</td>';
      }).join('') + '</tr>';
    }).join('');

    document.getElementById('contagem').textContent = dados.length + ' lançamento(s)';
    mostrarEstado('estadoTable');
  }

  function mostrarErro(erro) {
    document.getElementById('estadoError').textContent =
      '⚠ ' + (erro && erro.message ? erro.message : 'Ocorreu um erro ao carregar os dados.');
    mostrarEstado('estadoError');
  }

  function mostrarEstado(idAtivo) {
    ['estadoLoading', 'estadoEmpty', 'estadoError', 'estadoTable'].forEach(function (id) {
      document.getElementById(id).hidden = (id !== idAtivo);
    });
  }

  document.addEventListener('DOMContentLoaded', carregarDados);
</script>
</body>
</html>
